# Grade 9-12 Social Studies Subject Overlay
#
# Inherits from: grade_bands/g912.yaml
# Covers: World History, US History, US Government & Civics, Economics,
#         Geography, Psychology, Sociology, plus AP variants and electives.
#
# 9-12 social studies is highly course-specialized. Students engage in
# rigorous historical thinking (sourcing, contextualization, corroboration,
# close reading), evaluate competing arguments, write extended analytical
# essays with evidence, and conduct research with primary and secondary
# sources. AP courses prepare students for College Board exams. Civic
# reasoning prepares students for adult participation in democracy.
#
# Source authorities:
#   - C3 Framework for Social Studies State Standards
#   - NCSS National Curriculum Standards for Social Studies
#   - College Board AP US History, World History, US Government, Comparative Government,
#     European History, Macroeconomics, Microeconomics, Human Geography, Psychology CEDs
#   - Reading Like a Historian (Stanford History Education Group)
#   - National Council for History Education
#   - Facing History and Ourselves
#   - Teaching Tolerance / Learning for Justice
#   - James W. Loewen "Lies My Teacher Told Me"
#   - Howard Zinn "A People's History of the United States" (with critical framing)

id: g912_social
extends: g912
subject: social_studies
llm: claude-sonnet-4-5


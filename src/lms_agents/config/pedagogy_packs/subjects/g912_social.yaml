# ---------------------------------------------------------------------------
# Content Sensitivity Rules — strict at 9-12
# ---------------------------------------------------------------------------
content_sensitivity:
  required_inclusive_representation:
    cultural_backgrounds: "broad_global_diversity_required"
    indigenous_voices: "centered_when_relevant_and_throughout_us_history"
    enslaved_peoples: "humane_complete_treatment_with_named_individuals"
    immigration_stories: "diverse_humanizing_complex"
    abilities: "natural_inclusion"
    family_structures: "diverse"
    gender_representation: "balanced_with_attention_to_historical_marginalization"
    lgbtq_inclusion: "appropriate_when_relevant_to_history_and_contemporary_issues"

  historical_treatment:
    rule: >
      Tell the truth at college-prep rigor. High school students can handle
      complexity and ambiguity. Do not mythologize, do not minimize harm,
      do not flatten any people group into a single story. Always include
      multiple perspectives and use active voice for harm. Acknowledge
      ongoing impacts of historical injustices. Avoid both myth-making
      and cynical "no heroes" framing — present complex humans in complex
      situations making consequential choices.
    banned_simplifications:
      - "founding_fathers_unblemished_with_no_contradictions_about_slavery"
      - "westward_expansion_as_inevitable_progress"
      - "manifest_destiny_uncritical"
      - "lost_cause_mythology"
      - "civil_war_states_rights_without_acknowledging_slavery"
      - "first_thanksgiving_harmony_myth"
      - "columbus_hero_discovery_narrative"
      - "passive_voice_for_violence_done_to_marginalized_groups"
      - "single_story_of_any_culture_continent_or_people"
      - "colorblind_or_post_racial_framing_of_us_history"
    required_inclusions:
      - "indigenous_perspectives_throughout_us_history_not_only_at_contact"
      - "honest_complete_account_of_chattel_slavery_and_its_legacies"
      - "diverse_contributors_to_us_and_world_history_centered_not_supplemental"
      - "civil_rights_history_extending_beyond_mlk_to_movements_and_ongoing_struggles"
      - "ongoing_impacts_of_historical_injustices_today"
      - "resistance_and_agency_of_marginalized_peoples"
      - "complexity_and_contradictions_in_all_historical_actors"

  current_events_and_political_topics:
    rule: >
      High school social studies routinely addresses contemporary political
      topics. Present multiple legitimate perspectives, distinguish facts
      from opinions, model evidence-based reasoning, and avoid partisan
      framing or attacks. Help students develop civic reasoning skills
      without telling them what to think.
    required_practices:
      - "multiple_perspectives_on_contested_issues"
      - "distinguish_facts_from_opinions_and_speculation"
      - "model_evaluation_of_sources"
      - "respect_diverse_political_viewpoints_while_holding_to_factual_accuracy"

  banned_topics:
    - "graphic_violence_or_torture_imagery"
    - "current_partisan_political_attacks"
    - "religious_proselytization_of_any_faith"
    - "war_glorification"
    - "explicit_descriptions_of_sexual_violence"
    - "conspiracy_theories_presented_as_credible"

# ---------------------------------------------------------------------------
# Worksheet Format Whitelist
# ---------------------------------------------------------------------------
worksheet_formats:
  preferred_templates:
    - id: "g912_soc_primary_source_analysis_full"
      description: "Document with full sourcing, context, close reading, corroboration, significance"
      max_items: 1
    - id: "g912_soc_dbq_full"
      description: "Document-based question with multiple sources and structured essay response"
      max_items: 1
    - id: "g912_soc_long_essay_question"
      description: "AP-style long essay question with thesis, evidence, analysis, complexity"
      max_items: 1
    - id: "g912_soc_short_answer_question"
      description: "AP-style SAQ with stimulus and prompts"
      max_items: 4
    - id: "g912_soc_argumentative_essay"
      description: "Take a position with claim, evidence from sources, counter-argument, rebuttal"
      max_items: 1
    - id: "g912_soc_research_paper_workshop"
      description: "Topic, sources, notes, citations, draft sections"
      max_items: 1
    - id: "g912_soc_compare_systems_or_civilizations"
      description: "Two systems compared with thesis-driven analysis"
      max_items: 1
    - id: "g912_soc_data_or_chart_analysis"
      description: "Quantitative data or chart with interpretation and inference"
      max_items: 1
    - id: "g912_soc_supreme_court_case_brief"
      description: "Case facts, issue, holding, reasoning, significance"
      max_items: 1
    - id: "g912_soc_socratic_seminar_prep"
      description: "Compelling question, evidence gathering, response notes"
      max_items: 1
    - id: "g912_soc_civic_action_research"
      description: "Identify issue, research perspectives, propose evidence-based action"
      max_items: 1
    - id: "g912_soc_concept_practice"
      description: "Vocabulary or conceptual practice with context and application"
      max_items: 16
  banned_templates:
    - "memorize_dates_only_worksheet"
    - "single_perspective_history_narrative"
    - "elementary_color_and_label"
    - "fill_in_with_no_source_or_context"


# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  block_schedule_alternative_min: 90
  structure:
    - phase: "compelling_question_or_hook"
      duration_min: 6
      description: "Big inquiry question, image, primary source, or current event connection"
    - phase: "build_knowledge_with_text_or_source"
      duration_min: 18
      description: "Read, view, or analyze sources with historical thinking moves"
    - phase: "structured_discourse_or_collaboration"
      duration_min: 12
      description: "Discussion, debate, or collaborative analysis"
    - phase: "apply_or_create"
      duration_min: 14
      description: "Writing response, organizer, argument, or research task"
    - phase: "synthesis_and_close"
      duration_min: 5
      description: "Synthesis discussion, exit ticket, return to compelling question"

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 6
  length_max: 15
  primary_sources_visible_when_referenced: true
  diverse_perspectives_required: true
  no_glorification_of_violence: true
  cite_sources_visually: true
  on_screen_text_for_key_terms_dates_concepts: true


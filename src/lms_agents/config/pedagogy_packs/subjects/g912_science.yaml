# ---------------------------------------------------------------------------
# Three-Dimensional Learning
# ---------------------------------------------------------------------------
three_dimensional_learning:
  required: true
  rule: >
    NGSS three-dimensional learning continues at high school: every lesson
    integrates a Disciplinary Core Idea + Science and Engineering Practice
    + Crosscutting Concept. AP courses integrate the AP Science Practices
    in addition to or instead of NGSS practices. Students engage in
    authentic scientific inquiry, including question generation, study
    design, data analysis, and explanation construction.

# ---------------------------------------------------------------------------
# Investigation Requirement
# ---------------------------------------------------------------------------
investigation_requirement:
  required_frequency: "regular_weekly_or_more"
  rule: >
    Hands-on or interactive investigations are central to high school
    science. Lab work should include question, hypothesis (when
    appropriate), procedure, data collection, analysis with quantitative
    methods, error analysis, and conclusion supported by evidence.
    Simulations and high-quality data sets are acceptable substitutes
    when the real investigation is impractical or unsafe. AP courses
    require lab notebooks and inquiry-based investigations.
  common_g912_investigations:
    biology:
      - "diffusion_and_osmosis_with_dialysis_tubing"
      - "enzyme_activity_with_catalase_or_amylase"
      - "cellular_respiration_with_co2_indicator"
      - "photosynthesis_with_floating_leaf_disks"
      - "DNA_extraction_from_strawberries_or_cheek_cells"
      - "genetics_with_drosophila_or_corn_kernels"
      - "natural_selection_simulation_with_beans_or_fish"
      - "ecology_field_study_or_quadrat_sampling"
    chemistry:
      - "flame_tests_for_metal_ions"
      - "stoichiometry_with_precipitation_reactions"
      - "gas_law_demonstrations"
      - "titration_acid_base"
      - "kinetics_with_iodine_clock_reaction"
      - "calorimetry"
      - "electrochemistry_simple_cells"
    physics:
      - "kinematics_with_motion_sensors_or_video_analysis"
      - "newtons_second_law_with_carts_and_force_sensors"
      - "circular_motion_with_rotating_platform"
      - "energy_conservation_with_pendulum_or_spring"
      - "wave_demonstrations_ripple_tank_or_strings"
      - "circuits_with_resistors_meters_and_power_supplies"
      - "geometric_optics_with_lenses_and_mirrors"
    earth_environmental:
      - "rock_and_mineral_identification"
      - "topographic_map_analysis"
      - "weather_data_analysis_from_real_sources"
      - "water_quality_testing"
      - "ecosystem_field_study"

# ---------------------------------------------------------------------------
# Worksheet Format Whitelist
# ---------------------------------------------------------------------------
worksheet_formats:
  preferred_templates:
    - id: "g912_sci_formal_lab_report"
      description: "Question, hypothesis, materials, procedure, data, analysis, error, conclusion"
      max_items: 1
    - id: "g912_sci_data_analysis_quantitative"
      description: "Real data set with calculations, graphs, statistical analysis"
      max_items: 1
    - id: "g912_sci_claim_evidence_reasoning_full"
      description: "Full CER with multiple lines of evidence and counter-explanation"
      max_items: 3
    - id: "g912_sci_problem_set_quantitative"
      description: "Calculation-heavy practice with formulas and unit analysis"
      max_items: 18
    - id: "g912_sci_concept_application"
      description: "Apply core ideas to novel situations or real-world contexts"
      max_items: 8
    - id: "g912_sci_model_construction_and_use"
      description: "Build, use, and revise models of systems or processes"
      max_items: 1
    - id: "g912_sci_argumentation_from_evidence"
      description: "Multiple data sources, take a position, defend with evidence"
      max_items: 1
    - id: "g912_sci_research_or_literature_review"
      description: "Investigate a topic with peer-reviewed sources"
      max_items: 1
    - id: "g912_sci_engineering_design_project"
      description: "Define, design, build, test, iterate, communicate"
      max_items: 1
    - id: "g912_sci_ap_style_frq"
      description: "AP-style free-response question with rubric"
      max_items: 4
    - id: "g912_sci_practice_problems"
      description: "Mixed practice with quantitative and conceptual items"
      max_items: 20
  banned_templates:
    - "memorize_definitions_only"
    - "fill_in_vocab_with_no_phenomenon"
    - "elementary_color_and_label"
    - "k2_picture_match"


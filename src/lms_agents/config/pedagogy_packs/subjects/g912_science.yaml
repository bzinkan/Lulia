# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  block_schedule_alternative_min: 90
  model: "5E_or_AP_lab_inquiry_when_appropriate"
  structure:
    - phase: "engage"
      duration_min: 7
      description: "Phenomenon, demonstration, driving question, or current event"
    - phase: "explore_or_investigate"
      duration_min: 18
      description: "Hands-on lab, simulation, data collection, or modeling"
    - phase: "explain_with_concept_development"
      duration_min: 12
      description: "Discussion, vocabulary, model revision, formal explanation"
    - phase: "elaborate_or_apply"
      duration_min: 13
      description: "Apply to new situation, extend with reading, or solve problems"
    - phase: "evaluate_and_close"
      duration_min: 5
      description: "Formative check, exit ticket, or CER prompt"
  manipulatives_required: true
  safety_review_required_for_investigations: true
  homework_expected: true

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 6
  length_max: 15
  show_real_phenomenon_when_possible: true
  animation_acceptable_for_unobservable_systems: true
  must_use_evidence_language: true
  data_visualizations_when_relevant: true
  proper_scientific_notation_required: true
  ap_style_examples_for_ap_courses: true

# ---------------------------------------------------------------------------
# Safety Rules
# ---------------------------------------------------------------------------
safety_rules:
  banned_activities_without_strict_protocols:
    - "concentrated_acids_or_bases_without_PPE"
    - "open_flame_unsupervised"
    - "high_voltage_electrical_unsupervised"
    - "biohazard_materials"
    - "hazardous_chemicals_without_msds_review"
  required_practices:
    - "safety_goggles_for_chemical_or_lab_work"
    - "lab_apron_when_chemicals_used"
    - "closed_toe_shoes"
    - "tied_back_long_hair"
    - "no_eating_or_drinking_in_lab"
    - "review_msds_for_chemicals_used"
    - "proper_disposal_of_lab_materials"
    - "emergency_procedures_known"
  living_organism_rules:
    - "humane_treatment_of_all_living_things"
    - "consent_for_dissection_with_alternatives"
    - "iacuc_compliance_when_applicable"

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "formal_lab_report_with_error_analysis"
    - "claim_evidence_reasoning_response_full"
    - "data_analysis_with_quantitative_calculation"
    - "model_with_explanation_and_revision"
    - "design_an_investigation_with_controls"
    - "argue_from_evidence_with_counterargument"
    - "ap_style_free_response"
    - "research_or_literature_synthesis"
    - "engineering_design_with_iteration"
  banned:
    - "memorize_and_define_only"
    - "rapid_fire_vocab_recall"
    - "fill_in_the_word_with_no_context"

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["9", "10", "11", "12"]
  course_level_aware: true
  alignment_metadata_required:
    - "disciplinary_core_idea"
    - "science_and_engineering_practice"
    - "crosscutting_concept"
    - "specific_performance_expectation_code"
    - "course_level"
  default_frameworks_supported:

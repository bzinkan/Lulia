# Grade 9-12 Science Subject Overlay
#
# Inherits from: grade_bands/g912.yaml
# Covers: NGSS High School + discipline-specialized courses
#         (Biology, Chemistry, Physics, Earth/Environmental, AP variants).
#
# 9-12 science is highly discipline-specialized. Most schools sequence
# Biology → Chemistry → Physics, with Earth/Environmental, AP courses,
# and electives layered in. Students engage in genuine scientific inquiry,
# quantitative analysis, formal lab reports with error analysis, and
# discipline-specific reasoning. AP courses prepare students for the
# College Board exams with college-level rigor. Vocabulary explodes with
# discipline-specific Tier 3 terms.
#
# Source authorities:
#   - Next Generation Science Standards (NGSS) High School
#   - College Board AP Biology, Chemistry, Physics 1/2/C, Environmental Science CEDs
#   - A Framework for K-12 Science Education (NRC)
#   - Ambitious Science Teaching (Windschitl et al.)
#   - NSTA Position Statement on High School Science
#   - Disciplinary Literacy in Science (Shanahan)
#   - Modeling Instruction (American Modeling Teachers Association)

id: g912_science
extends: g912
subject: science
llm: claude-sonnet-4-5


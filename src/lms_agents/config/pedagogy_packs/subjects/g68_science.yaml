# ---------------------------------------------------------------------------
# Lesson Plan Overrides — 5E model with NGSS framing
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  model: "5E_with_three_dimensional_framing"
  structure:
    - phase: "engage"
      duration_min: 7
      description: "Anchoring phenomenon, demonstration, or driving question"
    - phase: "explore"
      duration_min: 18
      description: "Hands-on investigation, data collection, or model building"
    - phase: "explain"
      duration_min: 12
      description: "Discussion, vocabulary connection, model revision"
    - phase: "elaborate"
      duration_min: 10
      description: "Apply to new situation or extend with reading"
    - phase: "evaluate_and_close"
      duration_min: 8
      description: "Formative check, exit ticket, or CER prompt"
  manipulatives_required: true
  safety_review_required_for_investigations: true

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 5
  length_max: 10
  show_real_phenomenon_when_possible: true
  animation_acceptable_for_unobservable_systems: true   # cell, atom, plate tectonics
  must_use_evidence_language: true
  data_visualizations_when_relevant: true
  pause_for_prediction_or_analysis_moments: 2
  examples_per_video: 2

# ---------------------------------------------------------------------------
# Safety Rules
# ---------------------------------------------------------------------------
safety_rules:
  banned_activities_without_strict_protocols:
    - "concentrated_acids_or_bases"
    - "open_flame_unsupervised"
    - "high_voltage_electrical"
    - "biohazard_materials"
    - "preserved_specimens_from_unknown_sources"
  required_practices:
    - "safety_goggles_for_chemical_or_projectile_work"
    - "closed_toe_shoes"
    - "tied_back_long_hair"
    - "no_eating_or_drinking_in_lab"
    - "review_msds_for_chemicals_used"
    - "proper_disposal_of_lab_materials"
  living_organism_rules:
    - "humane_treatment_of_all_living_things"
    - "consent_for_dissection_with_alternatives"
    - "proper_care_of_classroom_organisms"

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "claim_evidence_reasoning_response"
    - "data_table_with_analysis_and_conclusion"
    - "model_with_explanation"
    - "design_an_investigation"
    - "argue_from_evidence_with_counterargument"
    - "interpret_graph_or_data_set"
    - "explain_phenomenon_using_scientific_principles"
    - "engineering_design_with_iteration"
  banned:
    - "memorize_and_define_only"
    - "rapid_fire_vocab_recall"
    - "fill_in_the_word_with_no_context"

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["6", "7", "8"]
  alignment_metadata_required:
    - "disciplinary_core_idea"                  # DCI
    - "science_and_engineering_practice"        # SEP
    - "crosscutting_concept"                    # CCC
    - "specific_performance_expectation_code"
  default_frameworks_supported:
    - "NGSS"
    - "TEKS-Science"
    - "Virginia-SOL-Science"
    - "Florida-SSS-Science"

# ---------------------------------------------------------------------------
# Teacher Curriculum Grounding
# ---------------------------------------------------------------------------
curriculum_grounding:
  honor_uploaded_curriculum: true
  common_g68_science_curricula_recognized:
    - "Amplify Science 6-8"
    - "OpenSciEd 6-8"
    - "Inspire Science (McGraw Hill)"
    - "FOSS Middle School"
    - "Discovery Education Science Techbook"
    - "STEMscopes Middle School"
    - "Carolina Building Blocks of Science"
    - "Pearson Interactive Science"
    - "BSCS Middle School Science"
  when_curriculum_uploaded:
    match_anchoring_phenomena: true
    match_terminology: true
    respect_storyline_sequence: true

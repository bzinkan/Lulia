# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  structure:
    - phase: "compelling_question_or_hook"
      duration_min: 6
      description: "Big inquiry question, image, artifact, or current connection"
    - phase: "build_knowledge_with_text_or_source"
      duration_min: 15
      description: "Read, view, or analyze sources with sourcing and context"
    - phase: "structured_discourse_or_collaboration"
      duration_min: 12
      description: "Partner or small group analysis with discourse moves"
    - phase: "apply_or_create"
      duration_min: 15
      description: "Writing response, organizer, argument, or creative task"
    - phase: "share_and_close"
      duration_min: 7
      description: "Synthesis discussion, exit ticket, return to compelling question"

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 5
  length_max: 10
  primary_sources_visible_when_referenced: true
  diverse_perspectives_required: true
  no_glorification_of_violence: true
  age_appropriate_imagery_only: true
  on_screen_text_for_key_terms_and_dates: true
  identify_sources_visually: true

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "primary_source_analysis_short_response"
    - "compare_two_or_more_perspectives"
    - "argumentative_paragraph_with_evidence"
    - "explain_cause_and_effect_with_analysis"
    - "interpret_map_chart_or_data"
    - "construct_timeline_with_significance_analysis"
    - "research_with_source_evaluation"
    - "dbq_response_intro_level"
  banned:
    - "memorize_dates_test"
    - "single_correct_perspective_test"
    - "rapid_fire_facts_recall_competition"

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["6", "7", "8"]
  alignment_metadata_required:

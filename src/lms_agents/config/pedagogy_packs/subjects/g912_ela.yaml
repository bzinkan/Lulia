# Grade 9-12 English Language Arts Subject Overlay
#
# Inherits from: grade_bands/g912.yaml
# Covers: literature, informational/argumentative reading, writing across
#         all modes, language conventions, vocabulary, speaking & listening,
#         research with citations.
#
# 9-12 ELA spans general English through AP English Language and AP
# English Literature. Students engage in close reading, rhetorical
# analysis, literary analysis, argumentative writing with sophisticated
# counter-argument, and full research papers with citations. The reading
# diet includes canonical and contemporary works, primary documents,
# academic articles, and challenging informational texts.
#
# Source authorities:
#   - CCSS-ELA 9-10 and 11-12 grade bands
#   - College Board AP English Language and Composition CED
#   - College Board AP English Literature and Composition CED
#   - NCTE position statements on adolescent literacy
#   - Lucy Calkins / Penny Kittle / Kelly Gallagher writing pedagogy
#   - 6+1 Traits of Writing
#   - MLA and APA style guides

id: g912_ela
extends: g912
subject: ela
llm: claude-sonnet-4-5

# ---------------------------------------------------------------------------
# Course Coverage
# ---------------------------------------------------------------------------
courses_supported:
  english_9:
    typical_focus: "literature_introduction_writing_foundations"
    in_scope:
      - "reading_literature_with_close_attention_to_text"
      - "reading_informational_text_with_analysis"
      - "argumentative_writing_with_clear_claim_and_evidence"
      - "informative_explanatory_writing"
      - "narrative_writing_with_craft"
      - "research_with_simple_citations"
      - "vocabulary_acquisition_through_text"
      - "language_conventions_grade_9_10"

  english_10:
    typical_focus: "literature_world_or_american_writing_with_analysis"
    in_scope:
      - "rhetorical_analysis_intro"
      - "literary_analysis_with_evidence"
      - "argumentative_writing_with_counterclaim_and_rebuttal"
      - "research_paper_with_proper_citations"
      - "extended_close_reading_of_complex_texts"

  english_11:
    typical_focus: "american_literature_argument_and_research_intensive"
    in_scope:
      - "rhetorical_analysis_full"
      - "argument_essays_with_sophisticated_counter_argument"
      - "literary_analysis_with_thesis_and_evidence"
      - "research_paper_with_works_cited_or_bibliography"
      - "synthesis_of_multiple_sources"
      - "primary_source_analysis_in_literary_context"

  english_12:
    typical_focus: "british_or_world_literature_capstone_writing"
    in_scope:
      - "extended_literary_analysis"
      - "rhetorical_analysis_of_canonical_speeches_and_essays"
      - "research_thesis_or_capstone_project"
      - "college_application_essay_writing_when_appropriate"
      - "advanced_close_reading"

  ap_english_language:
    typical_grade: "11"
    in_scope:
      - "rhetorical_analysis_of_nonfiction_essays_speeches_articles"
      - "argument_essays_with_sophisticated_evidence"
      - "synthesis_essays_using_multiple_provided_sources"
      - "analysis_of_authors_choices_and_their_effects"
      - "rhetorical_situation_full_analysis"
      - "logical_fallacies_identification"
      - "stylistic_analysis_diction_syntax_tone"

  ap_english_literature:
    typical_grade: "12"
    in_scope:
      - "literary_analysis_of_prose_passages"
      - "literary_analysis_of_poetry"
      - "literary_analysis_of_full_length_works"
      - "thematic_synthesis_across_works"
      - "analysis_of_literary_devices_and_their_effects"
      - "comparative_literary_analysis"

# ---------------------------------------------------------------------------
# Text Selection
# ---------------------------------------------------------------------------
text_selection:
  text_complexity_must_match_grade_band: true
  rule: >
    Use grade-band-appropriate Lexile and qualitative complexity. 9-10 band
    1050-1335L; 11-CCR band 1185-1385L. Above-grade text acceptable in close
    reading with scaffolding. Always include text-dependent questions
    requiring evidence from the text. Diverse authorship across all units.
  passage_length_words:
    english_9_10: "1000-3000"
    english_11_12: "1500-5000"
    ap_courses: "varied_including_full_length_works"
  text_types_required:
    - "literary_fiction_classic_and_contemporary"
    - "poetry_diverse_traditions"
    - "drama_classic_and_contemporary"
    - "nonfiction_essays_and_articles"
    - "primary_source_documents"
    - "speeches_and_rhetorical_texts"
    - "academic_or_journalistic_long_form"
  diverse_authorship_required: true
  representation_required:
    - "authors_from_diverse_backgrounds_central_not_supplemental"
    - "global_and_indigenous_voices"
    - "lgbtq_inclusion_when_age_appropriate"
    - "ability_inclusion"
    - "varied_historical_periods_and_movements"

# ---------------------------------------------------------------------------
# Worksheet Format Whitelist
# ---------------------------------------------------------------------------
worksheet_formats:
  preferred_templates:
    - id: "g912_ela_close_reading"
      description: "Complex passage with annotation, text-dependent questions, analysis"
      max_items: 1
    - id: "g912_ela_rhetorical_analysis"
      description: "Speech or essay with rhetorical situation, appeals, devices analysis"
      max_items: 1
    - id: "g912_ela_literary_analysis"
      description: "Literary text with theme, character, structure, craft analysis"
      max_items: 1
    - id: "g912_ela_argumentative_essay_with_planner"
      description: "Prompt + claim/evidence/counterclaim/rebuttal organizer + writing"
      max_items: 1
    - id: "g912_ela_synthesis_essay"
      description: "Multiple sources + synthesis prompt + planning + drafting space"
      max_items: 1
    - id: "g912_ela_research_paper_workshop"
      description: "Topic, sources, notes, citations, draft sections"
      max_items: 1
    - id: "g912_ela_paired_text_analysis"
      description: "Two related texts with comparative analysis questions"
      max_items: 1
    - id: "g912_ela_ap_style_frq"
      description: "AP-style free-response question with rubric"
      max_items: 3
    - id: "g912_ela_vocabulary_in_context"
      description: "Sophisticated words from grade-level text with usage analysis"
      max_items: 16
    - id: "g912_ela_grammar_and_style"
      description: "Sentence editing, combining, style analysis"
      max_items: 14
    - id: "g912_ela_socratic_seminar_prep"
      description: "Compelling question, evidence gathering, response notes"
      max_items: 1
    - id: "g912_ela_research_with_source_evaluation"
      description: "Topic, source evaluation, note-taking, citation practice"
      max_items: 1
  banned_templates:
    - "k2_picture_match"
    - "g35_short_passage_with_simple_questions"
    - "fill_in_the_blank_only"
    - "elementary_color_and_label"
    - "high_stakes_timed_fluency"


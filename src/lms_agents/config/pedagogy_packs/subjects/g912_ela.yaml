# ---------------------------------------------------------------------------
# Writing Expectations
# ---------------------------------------------------------------------------
writing_expectations:
  english_9_10:
    modes: ["argument", "informative", "narrative", "research_intro"]
    typical_length: "five_to_eight_paragraph_essay"
    research_paper_length: "3_to_5_pages_with_5_to_8_sources"
    scaffolds_required:
      - "outline_or_planning_template"
      - "model_essay_or_mentor_text"
      - "revision_checklist_with_4_to_6_criteria"
      - "peer_review_protocol"
    mechanics_expected:
      - "varied_sophisticated_sentence_structures"
      - "consistent_tone_and_voice"
      - "proper_citation_intro"
      - "active_and_passive_voice_appropriate"

  english_11_12:
    modes: ["argument_with_rebuttal", "rhetorical_analysis", "literary_analysis", "synthesis", "research"]
    typical_length: "six_to_ten_paragraph_essay"
    research_paper_length: "5_to_10_pages_with_8_to_15_sources"
    scaffolds_required:
      - "thesis_workshop"
      - "mentor_text_at_above_grade_level"
      - "revision_workshop_with_specific_criteria"
      - "writing_conferences_with_teacher"
      - "self_assessment_against_rubric"
    mechanics_expected:
      - "sophisticated_syntax_and_diction"
      - "voice_appropriate_to_purpose_and_audience"
      - "proper_MLA_or_APA_citation"
      - "varied_punctuation_for_effect"

# ---------------------------------------------------------------------------
# Layout Overrides
# ---------------------------------------------------------------------------
layout_overrides:
  reading_passage_formatting:
    line_spacing: 1.5
    line_numbering_for_close_reading: true
    paragraph_numbering_for_long_passages: true
    margins_for_annotation: true
    no_justified_text: true
  writing_space:
    typed_response_default: true
    word_count_target_visible: true
    citation_format_specified: true

# ---------------------------------------------------------------------------
# Story & Passage Content Rules
# ---------------------------------------------------------------------------
story_content:
  allowed_themes:
    - "identity_and_self_discovery"
    - "social_justice_and_civic_engagement"
    - "moral_complexity_and_ethical_dilemmas"
    - "history_and_memory"
    - "power_and_agency"
    - "alienation_and_belonging"
    - "love_in_age_appropriate_forms"
    - "loss_grief_and_resilience"
    - "scientific_discovery_and_ethics"
    - "art_and_creativity"
    - "war_and_its_consequences_with_care"
    - "freedom_and_constraint"
    - "tradition_and_change"
  acceptable_with_care:
    - "violence_when_thematically_essential_and_handled_seriously"
    - "substance_use_in_canonical_works_with_critical_framing"
    - "sexuality_in_canonical_works_age_appropriate"
    - "religious_themes_in_literary_context"
    - "political_themes_when_balanced_and_age_appropriate"
  banned:
    - "gratuitous_violence_or_torture_porn"
    - "explicit_sexual_content_outside_literary_canon"
    - "glorification_of_substance_abuse"
    - "graphic_self_harm_without_critical_framing"

# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  block_schedule_alternative_min: 90
  structure:
    - phase: "vocabulary_or_grammar_warmup"
      duration_min: 6
      description: "Word study, sentence editing, or quick recall"
    - phase: "mini_lesson_skill_or_strategy"
      duration_min: 12
      description: "Direct instruction with model text and think-aloud"
    - phase: "shared_or_close_reading"
      duration_min: 18
      description: "Guided text analysis with discussion and annotation"
    - phase: "independent_or_collaborative_writing_or_analysis"
      duration_min: 14
      description: "Writing, analysis, or research task"
    - phase: "share_synthesis_or_close"
      duration_min: 5
      description: "Discussion synthesis, exit ticket, or writing share"

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 6
  length_max: 15
  must_show_text_when_referencing: true
  highlight_rhetorical_or_literary_devices_visually: true
  show_writing_examples_step_by_step: true
  primary_sources_visible_when_referenced: true
  examples_per_video: 2

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "rhetorical_analysis_essay"
    - "literary_analysis_essay"
    - "argumentative_essay_with_rebuttal"
    - "synthesis_essay_with_multiple_sources"
    - "research_paper_with_citations"
    - "ap_style_frq"
    - "constructed_response_with_textual_evidence"
    - "annotation_of_text_for_close_reading"
    - "socratic_seminar_or_discussion_assessment"
  banned:
    - "memorize_and_define_only"
    - "speed_reading_for_grade"
    - "spelling_bee"

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["9", "10", "11", "12"]
  course_level_aware: true
  alignment_metadata_required:
    - "strand"                                  # RL, RI, W, SL, L
    - "cluster"
    - "specific_standard_code"
    - "course_level_or_grade"
  default_frameworks_supported:
    - "CCSS-ELA"
    - "TEKS-ELA"
    - "Virginia-SOL-ELA"
    - "Florida-BEST-ELA"
    - "AP-English-Language-CED"
    - "AP-English-Literature-CED"

# ---------------------------------------------------------------------------
# Teacher Curriculum Grounding
# ---------------------------------------------------------------------------
curriculum_grounding:
  honor_uploaded_curriculum: true
  common_g912_ela_curricula_recognized:
    - "Wit and Wisdom HS"
    - "EL Education HS"
    - "StudySync"
    - "Pearson myPerspectives HS"
    - "Into Literature (HMH) HS"
    - "SpringBoard HS"
    - "Norton Anthologies"
    - "Bedford/St. Martin's textbooks"
    - "Perrine's Sound and Sense"
    - "Bedford Reader for AP Lang"
  when_curriculum_uploaded:
    match_anchor_texts_when_named: true
    match_terminology: true
    respect_unit_thematic_focus: true

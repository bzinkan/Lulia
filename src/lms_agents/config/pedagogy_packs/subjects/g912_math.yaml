    - "OpenUp Resources HS Math"
    - "CPM Core Connections"
    - "Big Ideas Math Algebra/Geometry/Algebra 2"
    - "enVision Math (HS)"
    - "Carnegie Learning"
    - "Glencoe / McGraw Hill HS Math"
    - "Pearson HS Math"
    - "Stewart Calculus (AP Calc)"
    - "Larson Calculus (AP Calc)"
    - "The Practice of Statistics (Starnes/Tabor) for AP Stats"
  when_curriculum_uploaded:
    match_terminology: true
    match_notation_conventions: true
    match_lesson_structure_if_detectable: true

# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  block_schedule_alternative_min: 90
  structure:
    - phase: "warm_up_or_problem_of_day"
      duration_min: 6
      description: "Mental math, prior knowledge activation, or rich problem"
    - phase: "direct_instruction_with_modeling"
      duration_min: 15
      description: "Concept introduction with worked example and multiple representations"
    - phase: "guided_practice_and_discourse"
      duration_min: 12
      description: "Partner work, discourse moves, structured collaboration"
    - phase: "independent_or_collaborative_practice"
      duration_min: 17
      description: "Worksheet, task, exploration, or extended problem work"
    - phase: "exit_or_synthesis"
      duration_min: 5
      description: "Formative check, reflection, preview, or homework intro"
  homework_expected: true
  manipulatives_required: false
  technology_integration: "graphing_calculator_or_desmos_geogebra_when_relevant"

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 6
  length_max: 15
  must_show_proper_mathematical_notation: true
  worked_example_step_by_step_required: true
  multiple_representations_when_applicable: true
  pause_for_thinking_moments: 2
  examples_per_video: 3
  ap_style_examples_for_ap_courses: true

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "show_your_work_with_solution"
    - "explain_your_reasoning_in_complete_sentences"
    - "construct_a_proof_or_justification"
    - "modeling_problem_with_assumptions_and_conclusions"
    - "translate_between_representations"
    - "find_and_correct_the_error_with_explanation"
    - "ap_style_free_response"
    - "real_world_application_with_analysis"
  exit_ticket_format:
    max_items: 4
    must_include_show_your_work: true
    must_be_completable_in_min: 7

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["9", "10", "11", "12"]
  course_level_aware: true
  alignment_metadata_required:
    - "conceptual_category"                   # N, A, F, G, S, Modeling
    - "domain"
    - "cluster"
    - "specific_standard_code"
    - "course_level"                          # algebra_1, geometry, etc.
    - "mathematical_practice_targeted"
  default_frameworks_supported:
    - "CCSS-Math"
    - "TEKS-Math"
    - "Virginia-SOL-Math"
    - "Florida-BEST-Math"
    - "AP-Calculus-CED"
    - "AP-Statistics-CED"

# ---------------------------------------------------------------------------
# Teacher Curriculum Grounding
# ---------------------------------------------------------------------------
curriculum_grounding:
  honor_uploaded_curriculum: true
  common_g912_math_curricula_recognized:

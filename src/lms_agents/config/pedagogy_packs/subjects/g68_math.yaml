# ---------------------------------------------------------------------------
# Lesson Plan Overrides
# ---------------------------------------------------------------------------
lesson_plan_overrides:
  total_duration_min: 55
  structure:
    - phase: "warm_up_or_problem_of_day"
      duration_min: 6
      description: "Mental math, retrieval practice, or rich problem to spark thinking"
    - phase: "mini_lesson_with_modeling"
      duration_min: 12
      description: "Concept introduction with worked example and multiple representations"
    - phase: "structured_collaboration_or_discourse"
      duration_min: 12
      description: "Partner work, number talks, math talks with discourse moves"
    - phase: "independent_or_collaborative_practice"
      duration_min: 18
      description: "Worksheet, task, station, or extended problem work"
    - phase: "exit_ticket_and_close"
      duration_min: 7
      description: "Formative check + brief share or preview"
  manipulatives_required: false                # available but not required daily
  math_journal_recommended: true
  block_schedule_extension_supported: true     # 80-90 min blocks work too

# ---------------------------------------------------------------------------
# Video Overrides
# ---------------------------------------------------------------------------
video_overrides:
  length_min: 5
  length_max: 10
  must_show_multiple_representations: true
  worked_example_step_by_step_required: true
  real_world_hook_in_first_30_seconds: true
  pause_for_thinking_moments: 2
  examples_per_video: 3

# ---------------------------------------------------------------------------
# Assessment Mode Overrides
# ---------------------------------------------------------------------------
assessment_overrides:
  preferred:
    - "show_your_work_with_solution"
    - "explain_your_reasoning_in_complete_sentences"
    - "justify_your_answer_with_evidence"
    - "compare_two_strategies"
    - "find_and_correct_the_error"
    - "translate_between_representations"
    - "construct_an_argument_simple_proof"
    - "real_world_application_problem"
  exit_ticket_format:
    max_items: 4
    must_include_show_your_work: true
    must_be_completable_in_min: 7

# ---------------------------------------------------------------------------
# Standards Integration
# ---------------------------------------------------------------------------
standards_integration:
  respects_three_tier_hierarchy: true
  retrieval_grade_band_filter: ["6", "7", "8"]
  alignment_metadata_required:
    - "domain"                                  # RP, NS, EE, F, G, SP
    - "cluster"
    - "specific_standard_code"
    - "mathematical_practice_targeted"
  default_frameworks_supported:
    - "CCSS-Math"
    - "TEKS-Math"
    - "Virginia-SOL-Math"
    - "Florida-BEST-Math"

# ---------------------------------------------------------------------------
# Teacher Curriculum Grounding
# ---------------------------------------------------------------------------
curriculum_grounding:
  honor_uploaded_curriculum: true
  common_g68_math_curricula_recognized:
    - "Illustrative Mathematics 6-8"
    - "OpenUp Resources 6-8 Math"
    - "Eureka Math (EngageNY)"
    - "Connected Mathematics Project (CMP)"
    - "enVision Math"
    - "Big Ideas Math"
    - "Glencoe Math"
    - "Singapore Math Dimensions"
    - "Carnegie Learning"
    - "Reveal Math"
  when_curriculum_uploaded:
    match_terminology: true
    match_visual_model_conventions: true
    match_lesson_structure_if_detectable: true

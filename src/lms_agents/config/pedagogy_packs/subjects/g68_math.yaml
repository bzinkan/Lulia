      - "rate"
      - "unit rate"
      - "percent"
      - "equivalent ratios"
      - "absolute value"
      - "integer"
      - "rational number"
      - "opposite"
      - "expression"
      - "term"
      - "coefficient"
      - "variable"
      - "evaluate"
      - "substitute"
      - "equivalent expression"
      - "inequality"
      - "solution"
      - "quadrant"
      - "ordered pair"
      - "histogram"
      - "box plot"
      - "mean"
      - "median"
      - "mode"
      - "range"
      - "interquartile range"
      - "mean absolute deviation"
    seventh_grade:
      - "proportional"
      - "constant of proportionality"
      - "scale factor"
      - "markup"
      - "discount"
      - "interest"
      - "complementary angles"
      - "supplementary angles"
      - "vertical angles"
      - "circumference"
      - "diameter"
      - "radius"
      - "pi"
      - "cross section"
      - "sample"
      - "population"
      - "probability"
      - "compound event"
      - "outcome"
      - "tree diagram"
    eighth_grade:
      - "irrational number"
      - "scientific notation"
      - "exponent"
      - "base"
      - "function"
      - "linear function"
      - "slope"
      - "y-intercept"
      - "rate of change"
      - "system of equations"
      - "transformation"
      - "translation"
      - "reflection"
      - "rotation"
      - "dilation"
      - "congruent"
      - "similar"
      - "Pythagorean theorem"
      - "hypotenuse"
      - "legs"
      - "scatter plot"
      - "association"
      - "line of best fit"
      - "two-way table"
  banned_terms:
    - "logarithm"
    - "trigonometric ratio"
    - "sine"
    - "cosine"
    - "tangent"                                  # 9th+ as trig
    - "quadratic formula"
    - "discriminant"
    - "polynomial of degree higher than 2"
    - "matrix"
    - "limit"
    - "derivative"
    - "integral"

# ---------------------------------------------------------------------------
# Word Problem Contexts (middle-school relevant)
# ---------------------------------------------------------------------------
word_problem_contexts:
  allowed:
    - "sports_and_athletics_age_appropriate"
    - "video_games_and_streaming"
    - "music_concerts_and_streaming_subscriptions"
    - "smartphones_and_data_plans"
    - "social_media_engagement_metrics"
    - "skateboarding_and_extreme_sports"
    - "cooking_and_recipe_scaling"
    - "shopping_and_simple_budgeting"
    - "school_events_and_fundraisers"
    - "travel_and_distance_problems"
    - "scientific_measurements"
    - "sports_statistics_and_team_performance"
    - "art_design_and_proportions"
    - "construction_and_engineering"

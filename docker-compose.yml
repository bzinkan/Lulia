services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the Dockerfile's non-root USER for local dev: the source tree
    # is bind-mounted from the host, and --reload needs write access to the
    # __pycache__ directories it creates. Prod (ECS task def) does NOT set
    # `user` and runs as the image's non-root `appuser` (UID 10001).
    user: "0:0"
    ports:
      - "8000:8000"
    env_file: .env.development
    environment:
      - S3_PUBLIC_ENDPOINT=http://localhost:9000
      - INNGEST_DEV=1
      - INNGEST_BASE_URL=http://inngest:8288
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./data/prebuilt_activities:/app/data/prebuilt_activities:ro
      - ./data/state_standards:/app/data/state_standards:ro
      - ./data/content:/data/content
      - "C:/Users/zinka/OneDrive/Desktop/Lulia Reference Material:/refs:ro"
    command: uvicorn src.lms_agents.main:app --host 0.0.0.0 --port 8000 --reload

  inngest:
    image: inngest/inngest:latest
    command: "inngest dev -u http://api:8000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - api

  # worker service removed — replaced by Inngest cron functions
  # (cleanup_stale_games, purge_old_webhooks, analytics_rollup)

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./dashboard/src:/app/src

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lulia
      POSTGRES_USER: lulia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lulia"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/lulia-uploads;
      mc mb --ignore-existing local/lulia-generated;
      mc mb --ignore-existing local/lulia-scans;
      mc mb --ignore-existing local/lulia-templates;
      mc mb --ignore-existing local/lulia-activities;
      mc anonymous set download local/lulia-uploads;
      mc anonymous set download local/lulia-generated;
      mc anonymous set download local/lulia-activities;
      echo 'All buckets created + public read set';
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:

# Alembic config.
#
# Most knobs here are intentionally left at Alembic defaults. The key bits
# we override:
#   - script_location: our migration directory sits at the project root.
#   - file_template:   timestamp + slug so revisions sort chronologically.
#   - sqlalchemy.url:  DELIBERATELY empty. env.py reads DB_HOST/... from the
#                      environment so we don't hardcode creds in a repo file.
#
# Invocation:
#   docker compose exec api alembic current            # show HEAD
#   docker compose exec api alembic upgrade head       # apply pending
#   docker compose exec api alembic revision -m "..."  # new migration
#
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
sqlalchemy.url =


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

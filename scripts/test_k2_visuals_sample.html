<!DOCTYPE html><html><head><meta charset="utf-8">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=Fredoka:wght@400;500;600&display=swap');
:root {
  --t-primary: #F97316; --t-primary-light: #FB923C;
  --t-primary-lighter: #FDBA74; --t-primary-lightest: #FED7AA;
  --t-primary-bg: #FFF7ED; --t-primary-dark: #EA580C;
  --t-primary-darkest: #9A3412;
  --t-heading-font: 'DM Serif Display', serif; --t-body-font: 'DM Sans', sans-serif;
  --t-bg: #FFFFFF; --t-bg-tint: #FEF9F2;
  --t-text: #1C1917; --t-text-secondary: #78716C;
  --t-text-muted: #A8A29E; --t-border: #E7E5E4;
  --t-border-light: #F5F5F4;
  --t-success: #16A34A; --t-success-bg: #DCFCE7;
}

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--t-body-font);
        font-size: 14px;
        color: var(--t-text);
        line-height: 1.6;
        background: var(--t-bg);
      }
      .page {
        width: 8.5in;
        min-height: 11in;
        padding: 0.6in 0.7in;
        margin: 0 auto;
        position: relative;
      }
      h1, h2, h3 { font-family: var(--t-heading-font); }
      h1 { font-size: 22px; margin-bottom: 4px; }
      h2 { font-size: 16px; margin-bottom: 8px; color: var(--t-primary-darkest); }
      h3 { font-size: 13px; margin-bottom: 4px; }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid var(--t-primary);
        padding-bottom: 10px;
        margin-bottom: 16px;
      }
      .header-left h1 { color: var(--t-text); }
      .header-left .subtitle { font-size: 12px; color: var(--t-text-secondary); margin-top: 2px; }
      .header-right {
        text-align: right;
        font-size: 12px;
        color: var(--t-text-secondary);
      }
      .header-right .field-line {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 4px;
        justify-content: flex-end;
      }
      .header-right .field-label { font-weight: 600; color: var(--t-primary-darkest); font-size: 11px; }
      .header-right .field-blank {
        border-bottom: 1px solid var(--t-border);
        width: 140px;
        display: inline-block;
        height: 18px;
      }
      .standards-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 14px;
      }
      .standard-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--t-primary-bg);
        color: var(--t-primary-darkest);
        border: 1px solid var(--t-primary-lighter);
        font-weight: 500;
      }
      .instructions {
        background: var(--t-primary-bg);
        border-left: 3px solid var(--t-primary);
        padding: 8px 12px;
        font-size: 12px;
        color: var(--t-primary-darkest);
        margin-bottom: 16px;
        border-radius: 0 8px 8px 0;
      }
      .question {
        margin-bottom: 14px;
        page-break-inside: avoid;
      }
      .question-number {
        font-weight: 700;
        color: var(--t-primary);
        margin-right: 6px;
      }
      .question-text { font-size: 13px; color: var(--t-text); }
      .answer-line {
        border-bottom: 1px solid var(--t-border);
        height: 24px;
        margin-top: 6px;
        margin-left: 20px;
      }
      .answer-lines-multi {
        margin-top: 6px;
        margin-left: 20px;
      }
      .answer-lines-multi .line {
        border-bottom: 1px solid var(--t-border);
        height: 22px;
      }
      .mc-options {
        margin-top: 4px;
        margin-left: 20px;
        font-size: 13px;
      }
      .mc-options .option { margin-bottom: 2px; }
      .mc-options .option-letter { font-weight: 600; color: var(--t-primary-darkest); margin-right: 8px; }
      .word-bank {
        border: 1px solid var(--t-border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 16px;
        background: var(--t-bg-tint);
      }
      .word-bank-title { font-size: 11px; font-weight: 600; color: var(--t-primary-darkest); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
      .word-bank-words { display: flex; flex-wrap: wrap; gap: 8px; }
      .word-bank-word { font-size: 13px; color: var(--t-text); padding: 2px 10px; background: white; border-radius: 6px; border: 1px solid var(--t-primary-lighter); }
      .difficulty-badge {
        display: inline-block;
        font-size: 9px;
        padding: 1px 6px;
        border-radius: 4px;
        font-weight: 600;
        margin-left: 6px;
        text-transform: uppercase;
      }
      .diff-easy { background: #DCFCE7; color: #16A34A; }
      .diff-medium { background: #FEF3C7; color: #D97706; }
      .diff-hard { background: #FEF2F2; color: #EF4444; }
      .points { font-size: 10px; color: var(--t-text-muted); float: right; }
      .answer-key-answer { color: var(--t-success); font-weight: 600; }
      .footer {
        position: absolute;
        bottom: 0.4in;
        left: 0.7in;
        right: 0.7in;
        text-align: center;
        font-size: 9px;
        color: var(--t-text-muted);
        border-top: 1px solid var(--t-border-light);
        padding-top: 6px;
      }
      /* Print */
      @media print {
        body { background: white; }
        .page { padding: 0.5in 0.6in; margin: 0; box-shadow: none; }
        .no-print { display: none; }
        @page { margin: 0; size: letter; }
      }
      /* Card grid */
      .card-grid {
        display: grid;
        gap: 12px;
      }
      .card-grid-6 { grid-template-columns: repeat(2, 1fr); }
      .card-grid-8 { grid-template-columns: repeat(2, 1fr); }
      .card {
        border: 1px solid var(--t-border);
        border-radius: 12px;
        padding: 14px;
        page-break-inside: avoid;
        position: relative;
      }
      .card-number {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 10px;
        font-weight: 700;
        color: var(--t-primary);
        background: var(--t-primary-bg);
        border-radius: 50%;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cut-line {
        border-top: 1px dashed #D6D3D1;
        margin: 8px 0;
      }
      /* Bingo */
      .bingo-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border: 2px solid var(--t-primary);
        border-radius: 10px;
        overflow: hidden;
      }
      .bingo-cell {
        border: 1px solid var(--t-border);
        padding: 10px 4px;
        text-align: center;
        font-size: 11px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bingo-header {
        background: var(--t-primary);
        color: white;
        font-family: var(--t-heading-font);
        font-size: 18px;
        font-weight: 700;
        padding: 8px;
      }
      .bingo-free {
        background: var(--t-primary-bg);
        font-weight: 700;
        color: var(--t-primary);
        font-size: 14px;
      }
      /* Passage */
      .passage {
        background: var(--t-bg-tint);
        border: 1px solid var(--t-border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
        font-size: 13px;
        line-height: 1.8;
      }
      .passage .line-number {
        display: inline-block;
        width: 24px;
        text-align: right;
        margin-right: 10px;
        color: var(--t-text-muted);
        font-size: 10px;
        user-select: none;
      }
      .vocab-sidebar {
        background: #FFF7ED;
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
      }
      .vocab-sidebar .vocab-word { font-weight: 600; color: var(--t-primary-darkest); }
      .vocab-sidebar .vocab-def { color: var(--t-text-secondary); margin-left: 4px; }
      /* Two-column for reading comp */
      .two-col { display: grid; grid-template-columns: 1fr 200px; gap: 16px; }
      /* Half-page */
      .half-page { min-height: 5.25in; max-height: 5.5in; overflow: hidden; }
      .half-divider { border-top: 2px dashed var(--t-border); margin: 8px 0; }
      /* Graphic organizer */
      .go-venn { display: flex; justify-content: center; gap: 0; margin: 20px 0; }
      .go-circle {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: 2px solid #F97316;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-size: 11px;
        text-align: center;
      }
      .go-circle:nth-child(2) { margin-left: -40px; }
      .go-tchart {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 2px solid var(--t-primary);
        border-radius: 10px;
        overflow: hidden;
      }
      .go-tchart-header {
        background: var(--t-primary-bg);
        padding: 8px;
        font-weight: 600;
        text-align: center;
        border-bottom: 2px solid var(--t-primary);
        font-family: var(--t-heading-font);
      }
      .go-tchart-cell {
        padding: 12px;
        min-height: 200px;
        border-right: 1px solid #E7E5E4;
      }
      .go-kwl {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border: 2px solid var(--t-primary);
        border-radius: 10px;
        overflow: hidden;
      }
      .study-topic {
        background: #FFF7ED;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .study-vocab { font-weight: 600; color: var(--t-primary); }
      .study-example {
        background: var(--t-bg-tint);
        border-left: 3px solid var(--t-primary-lighter);
        padding: 8px 12px;
        margin: 8px 0;
        font-size: 12px;
        border-radius: 0 8px 8px 0;
      }
      
.question-visual {
  margin: 8px 0 12px 28px;
  padding: 8px 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}
.question-visual svg {
  display: block;
  max-width: 100%;
  height: auto;
}
.visual-label {
  font-size: 0.85em;
  color: var(--t-text-secondary, #78716C);
  font-style: italic;
}
.visual-placeholder {
  border: 2px dashed var(--t-border, #E7E5E4);
  background: var(--t-bg-tint, #FEF9F2);
  padding: 12px 16px;
  border-radius: 8px;
  color: var(--t-text-secondary, #78716C);
  font-size: 0.9em;
  font-style: italic;
}
.visual-placeholder strong {
  display: block;
  font-style: normal;
  color: var(--t-text, #1C1917);
  margin-bottom: 4px;
}

    </style>
</head>
